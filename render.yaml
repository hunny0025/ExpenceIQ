# ╔══════════════════════════════════════════════════╗
# ║          Render Deployment Config                ║
# ║          ExpenseIQ — Backend (Node/Express)      ║
# ╚══════════════════════════════════════════════════╝
#
# Deploy instructions:
#   1. Go to https://dashboard.render.com → New → Web Service
#   2. Connect your GitHub repo
#   3. Render will auto-detect this render.yaml
#   4. Add secrets in the Render dashboard (MONGO_URI, JWT_SECRET, SENTRY_DSN)

services:
  - type: web
    name: expenseiq-api
    runtime: node
    region: singapore          # closest to India; change if needed
    plan: free                 # upgrade to starter for always-on

    # Build & start
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js

    # Health check — Render will restart the service if this fails
    healthCheckPath: /api/health

    # Auto-deploy on every push to main
    autoDeploy: true
    branch: main

    # Environment variables
    # ⚠️  Secrets (MONGO_URI, JWT_SECRET, SENTRY_DSN) must be added in the
    #     Render dashboard under Environment → Secret Files or Environment Groups.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render uses 10000 by default for web services
      - key: CORS_ORIGIN
        value: https://expenseiq.vercel.app
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000          # 15 minutes
      - key: RATE_LIMIT_MAX
        value: 100
      # ── Secrets — fill these in the Render dashboard, NOT here ───────────
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: SENTRY_DSN
        sync: false
