name: ExpenseIQ CI/CD

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────
  # 1. Backend — Lint & Test
  # ─────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_key
          MONGO_URI: mongodb://localhost:27017/expenseiq_test

  # ─────────────────────────────────────────────────────
  # 2. Frontend — Lint & Build
  # ─────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint --if-present

      - name: Build for production
        run: npm run build
        env:
          VITE_API_URL: https://expenseiq-api.onrender.com/api
          VITE_ENV: production

      # Upload the built dist/ so the Lighthouse job can reuse it
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────
  # 3. Lighthouse Performance Audit (main & staging only)
  # Informational only — never blocks CI (continue-on-error)
  # Uses @lhci/cli directly to avoid treosh action Node 20 issue
  # ─────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: frontend
    continue-on-error: true   # audit is informational — NEVER blocks deploys
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Download the pre-built dist — avoids rebuilding frontend
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      # Install LHCI CLI + http-server (needed by lighthouserc.cjs startServerCommand)
      - name: Install Lighthouse CI CLI and http-server
        run: npm install -g @lhci/cli@latest http-server

      - name: Run Lighthouse CI
        run: lhci autorun

  # ─────────────────────────────────────────────────────
  # NOTE: Vercel deployment is handled automatically by
  # Vercel's GitHub App integration (no CI secrets needed).
  # Connect at: https://vercel.com/new → Import Git Repository
  # ─────────────────────────────────────────────────────

