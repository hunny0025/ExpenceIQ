name: ExpenseIQ CI/CD

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────
  # 1. Backend — Lint & Test
  # ─────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: ci_test_secret_key
          MONGO_URI: mongodb://localhost:27017/expenseiq_test

  # ─────────────────────────────────────────────────────
  # 2. Frontend — Lint & Build
  # ─────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint --if-present

      - name: Build for production
        run: npm run build
        env:
          VITE_API_URL: https://expenseiq-api.onrender.com/api
          VITE_ENV: production

      # Upload the built dist/ so the Lighthouse job can reuse it
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────
  # 3. Lighthouse Performance Audit (main & staging only)
  # Informational only — never blocks CI (continue-on-error)
  # Uses @lhci/cli directly to avoid treosh action Node 20 issue
  # ─────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: frontend
    continue-on-error: true   # audit is informational — NEVER blocks deploys
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Download the pre-built dist — avoids rebuilding frontend
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      # Install LHCI CLI directly — runs on Node 24, no action wrapper needed
      - name: Install Lighthouse CI CLI
        run: npm install -g @lhci/cli@latest

      - name: Run Lighthouse CI
        run: lhci autorun --config=./lighthouserc.cjs

  # ─────────────────────────────────────────────────────
  # 4. Deploy to Vercel (staging branch → preview)
  # ─────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy — Vercel Preview
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    continue-on-error: true   # skips gracefully when VERCEL_TOKEN not yet set
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Preview)
        working-directory: ./frontend
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────────────────
  # 5. Deploy to Vercel (main branch → production)
  # ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy — Vercel Production
    runs-on: ubuntu-latest
    needs: [backend, frontend, lighthouse]
    continue-on-error: true   # skips gracefully when VERCEL_TOKEN not yet set
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (Production)
        working-directory: ./frontend
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
